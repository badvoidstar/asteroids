<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astervoids – Debug</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 24px;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #00ff00;
        }

        #session-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        #no-data {
            color: #888;
            font-style: italic;
        }

        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .column h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }

        .metric-list {
            list-style: none;
            padding: 0;
        }

        .metric-list li {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.95rem;
        }

        .metric-label {
            color: #888;
        }

        .metric-value {
            text-align: right;
            min-width: 80px;
        }

        .section-heading {
            font-size: 0.95rem;
            color: #ffff00;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .rtt-good { color: #00ff00; }
        .rtt-ok { color: #ffff00; }
        .rtt-bad { color: #ff0000; }

        .placeholder-text {
            color: #555;
            font-style: italic;
            font-size: 0.9rem;
        }

        .config-control {
            margin-bottom: 14px;
        }

        .config-control label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 4px;
        }

        .config-control .config-value {
            color: #00ff00;
            font-variant-numeric: tabular-nums;
        }

        .config-control input[type=range] {
            width: 100%;
            accent-color: #00ff00;
        }

        .config-control .config-help {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        button.config-reset {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 4px 10px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
        }

        button.config-reset:hover {
            background: #00ff0022;
        }
    </style>
</head>
<body>
    <h1>Astervoids Debug</h1>
    <div id="session-label"></div>

    <div class="columns" id="columns">
        <div class="column" id="runtime-column">
            <h2>Runtime Metrics</h2>
            <div id="no-data" class="placeholder-text">Waiting for game data…</div>
            <ul class="metric-list" id="core-metrics"></ul>
            <div id="member-section"></div>
        </div>
        <div class="column">
            <h2>Configuration</h2>
            <div id="config-panel"></div>
            <button class="config-reset" id="config-reset" type="button">Reset to defaults</button>
            <p class="config-help" style="margin-top:8px;">Overrides apply live and persist in this browser. They take effect on the next asteroid split.</p>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('astervoids-debug');
        const coreMetricsEl = document.getElementById('core-metrics');
        const memberSectionEl = document.getElementById('member-section');
        const columnsEl = document.getElementById('columns');
        const noDataEl = document.getElementById('no-data');
        const sessionLabelEl = document.getElementById('session-label');

        // Send periodic heartbeat so the game client knows we're listening
        channel.postMessage('ping');
        setInterval(() => channel.postMessage('ping'), 1000);

        function rttClass(rtt) {
            if (rtt <= 64) return 'rtt-good';
            if (rtt <= 128) return 'rtt-ok';
            return 'rtt-bad';
        }

        function fpsClass(fps) {
            if (fps >= 55) return 'rtt-good';
            if (fps >= 30) return 'rtt-ok';
            return 'rtt-bad';
        }

        function renderCoreMetrics(data) {
            const offsetReady = data.clockOffsetInitialized === true;
            const offsetVal = offsetReady
                ? `${data.clockOffsetMs >= 0 ? '+' : ''}${data.clockOffsetMs} ms`
                : '— (uninitialized)';
            const sampleRttDisplay = (data.clockSampleRtt != null && isFinite(data.clockSampleRtt))
                ? `${data.clockSampleRtt} ms` : '—';
            const items = [
                { label: 'RTT (broadcast EMA)', value: `${data.rtt} ms`, cls: rttClass(data.rtt) },
                { label: 'FPS', value: `${data.fps ?? '—'}`, cls: data.fps != null ? fpsClass(data.fps) : '' },
                { label: 'TX (send interval)', value: `${data.tx} ms` },
                { label: 'Jitter', value: `${data.jitter} ms` },
                { label: 'Buffer delay', value: `${data.buf} ms` },
                { label: 'Objects (owned / total)', value: `${data.ownedObjs} / ${data.totalObjs}` },
                { label: 'Reconciliations', value: `${data.reconciliationCount}` },
                { label: 'Clock offset', value: offsetVal, cls: offsetReady ? 'rtt-good' : 'rtt-bad' },
                { label: 'RTT (clock min, pure)', value: sampleRttDisplay },
                { label: 'Clock samples (accepted / rejected)', value: `${data.clockSampleCount ?? 0} / ${data.clockRejectedCount ?? 0}` }
            ];
            coreMetricsEl.innerHTML = items.map(item => {
                const cls = item.cls ? ` class="${item.cls}"` : '';
                return `<li><span class="metric-label">${item.label}</span><span class="metric-value"${cls}>${item.value}</span></li>`;
            }).join('');
        }

        function renderMemberMetrics(members, myMemberId) {
            const ids = Object.keys(members);
            if (ids.length === 0) {
                memberSectionEl.innerHTML = '';
                return;
            }
            let html = '<div class="section-heading">Per-Member Metrics</div>';
            for (const memberId of ids) {
                const m = members[memberId];
                const label = memberId === myMemberId ? `${memberId} (you)` : memberId;
                const shortId = label.length > 12 ? label.substring(0, 12) + '…' : label;
                html += `<div class="section-heading" style="font-size:0.85rem; color:#aaa; margin-top:10px;">${shortId}</div>`;
                html += '<ul class="metric-list">';
                html += `<li><span class="metric-label">Send interval</span><span class="metric-value">${m.remoteSendInterval} ms</span></li>`;
                html += `<li><span class="metric-label">Computed delay</span><span class="metric-value">${m.computedDelay} ms</span></li>`;
                html += '</ul>';
            }
            memberSectionEl.innerHTML = html;
        }

        channel.onmessage = (event) => {
            const data = event.data;
            noDataEl.style.display = 'none';
            if (data.sessionName) {
                sessionLabelEl.textContent = `Session: ${data.sessionName}`;
            }
            renderCoreMetrics(data);
            renderMemberMetrics(data.members || {}, data.myMemberId || '');
        };

        // ─── Configuration overrides ────────────────────────────────────────
        // Sliders push { type:'config-update', key, value } to the game over the
        // same BroadcastChannel. Values persist in localStorage and are re-broadcast
        // on load so a page refresh (game or debug) doesn't drop the user's tuning.
        const CONFIG_DEFS = [
            {
                key: 'ASTEROID_DENSITY',
                label: 'Asteroid density',
                min: 0.1, max: 20, step: 0.1, default: 5.0,
                fmt: v => v.toFixed(1),
                help: 'M = density · R². With independent deflection/separation knobs, density damps only separation by 1/√density (deflection and spin are velocity-driven and density-independent).',
            },
            {
                key: 'ASTEROID_MAX_SPEED',
                label: 'Asteroid max linear speed',
                min: 0, max: 2, step: 0.025, default: 0.4,
                fmt: v => v.toFixed(3),
                help: 'Per-frame cap on |velocity| of locally-owned asteroids (same units as SHIP_MAX_SPEED — normalized refdim/s). Default 0.4 (half the ship cap of 0.8) reins in compounded velocity from chained splits while still letting large hits accelerate fragments visibly. Realistic speeds in normal play peak around 0.4-0.6, so this cap will engage frequently. 0 = no cap. Note: only locally-owned asteroids are clamped — in multiplayer this affects the asteroids you currently own; remote ones reflect their owner\'s setting.',
            },
            {
                key: 'ASTEROID_MAX_SPIN',
                label: 'Asteroid max spin (rad/frame)',
                min: 0, max: 1, step: 0.005, default: Math.PI / 6,
                fmt: v => `${v.toFixed(3)} (${(v * 60 / (2 * Math.PI)).toFixed(2)} rot/s)`,
                help: 'Per-frame cap on |rotationSpeed| of locally-owned asteroids (same units as SHIP_TURN_SPEED — radians per 60fps frame). Default π/6 ≈ 0.524 corresponds to 5 full rotations per second. 0 = no cap. Only affects locally-owned asteroids.',
            },
            {
                key: 'DEFLECTION_KICK',
                label: 'Deflection kick (head-on Δv_COM)',
                min: 0, max: 5e-3, step: 1e-5, default: 1e-3,
                fmt: v => v.toExponential(2),
                help: 'Head-on parent COM Δv per bullet hit (refdim/s). Higher = more trajectory deflection and induced spin. Independent of separation: changes only how the parent body bends, never how far children fly apart.',
            },
            {
                key: 'SEPARATION_ENERGY',
                label: 'Separation energy (E_sep)',
                min: 0, max: 1e-3, step: 1e-6, default: 3.00e-4,
                fmt: v => v.toExponential(2),
                help: 'Energy released into fragment separation per hit (refdim²/s²). Higher = children fly apart faster. Separation speed scales with √E_sep / √(ρR²). Independent of deflection.',
            },
            {
                key: 'SEPARATION_ENERGY_SIZE_BLEND',
                label: 'Separation energy size blend',
                min: 0, max: 1, step: 0.01, default: 1.0,
                fmt: v => v.toFixed(2),
                help: '0 = fixed E_sep per hit (legacy, separation compounds across splits). 1 = E_sep ∝ R² (generation-independent separation speed).',
            },
            {
                key: 'MASS_SPLIT_BIAS',
                label: 'Mass split bias (offset → asymmetry)',
                min: 0, max: 1, step: 0.01, default: 0.75,
                fmt: v => v.toFixed(2),
                help: '1 = current behavior (50/50 head-on, skewed for glancing). 0 = always 50/50 regardless of impact offset.',
            },
            {
                key: 'FRACTURE_ENABLED',
                label: 'Fracture split enabled (0/1)',
                min: 0, max: 1, step: 1, default: 1,
                fmt: v => `${Math.round(v)}`,
                help: 'Master switch for fracture splits. 0 = legacy disk split path, 1 = polygon fracture path.',
            },
            {
                key: 'FRACTURE_VERTEX_DENSITY',
                label: 'Fracture vertex density (× parent spacing)',
                min: 0, max: 3, step: 0.05, default: 1.0,
                fmt: v => v.toFixed(2),
                help: 'Multiplier on the chord-length-derived jag count. 1 = match parent perimeter vertex spacing; 0 = straight chord; >1 = more jag points along the fracture.',
            },
            {
                key: 'FRACTURE_JAGGEDNESS',
                label: 'Fracture jaggedness (× R)',
                min: 0, max: 1, step: 0.01, default: 0.35,
                fmt: v => v.toFixed(2),
                help: 'Maximum perpendicular displacement of each fracture jag point, as a fraction of the parent radius.',
            },
            {
                key: 'DEFLECTION_TIME_LIMIT',
                label: 'Shooter-deflection time limit (s)',
                min: 0.05, max: 5, step: 0.05, default: 0.5,
                fmt: v => `${v.toFixed(2)} s`,
                help: 'Time horizon over which a fragment must be steered off a collision course with the ship that fired the destroying shot. Required Δv = (target_miss − d_close) / max(t_close, T) — larger T tightens the impulse cap (gentler max deflection); smaller T allows larger impulses for imminent collisions.',
            },
            {
                key: 'DEFLECTION_SCALE',
                label: 'Shooter-deflection scale',
                min: 0, max: 3, step: 0.05, default: 1.2,
                fmt: v => v.toFixed(2),
                help: '0 = feature disabled (no extra impulse). 1 = just enough to graze the ship\'s collision radius. >1 = miss by extra margin (target miss = scale · R_sum).',
            },
            {
                key: 'MAX_EXTRAPOLATION',
                label: 'Max extrapolation (s)',
                min: 0, max: 5, step: 0.1, default: 2.0,
                fmt: v => `${v.toFixed(1)} s`,
                help: 'Cap on remote-object simulation projection: applied to (a) bracket-search single-snap velocity extrapolation, (b) local-owner spawn-projection of newly-adopted children, and (c) ownership-migration handoff seed. Higher = smoother through long packet gaps but more overshoot if velocity changes during the gap. 0 = disable all forward projection (objects freeze at the latest snapshot until the next one arrives).',
            },
            {
                key: 'SPAWN_BRIDGE_ENABLED',
                label: 'Spawn bridge enabled (0/1)',
                min: 0, max: 1, step: 1, default: 1,
                fmt: v => `${Math.round(v)}`,
                help: 'On OnObjectReplaced (e.g. asteroid split), synthesize an extra snapshot at "local render time" carrying the parent\'s last-interpolated position. Bracket-search interpolates parent_pos → child authority_pos over one display delay, eliminating the spawn hitch on LAN and softening it under high latency. 0 = disable (revert to single-authority install: position discontinuity at every replace, magnitude proportional to (parent_vel − child_vel) × latency).',
            },
            {
                key: 'SHIP_TURN_SPEED',
                label: 'Ship turn max speed (rad/frame)',
                min: 0, max: 0.3, step: 0.005, default: 0.12,
                fmt: v => `${v.toFixed(3)} (${(v * 60 * 180 / Math.PI).toFixed(0)} °/s)`,
                help: 'Per-frame cap on ship angular speed (also the keyboard turn rate). Peak touch turn rate is SHIP_TURN_SPEED · TOUCH_TURN_MAX. Default 0.12 rad/frame ≈ 412°/s at 60fps.',
            },
            {
                key: 'TOUCH_TURN_GAIN',
                label: 'Touch displacement → turn-speed gain',
                min: 0, max: 5, step: 0.1, default: 2.0,
                fmt: v => v.toFixed(2),
                help: 'Linear slope mapping the left-anchor lateral displacement (as a fraction of TOUCH_STICK_RADIUS_FRAC · refPx) to turnTarget. turnTarget is then clamped to ±TOUCH_TURN_MAX before multiplying by SHIP_TURN_SPEED. Higher = sharper turning per unit finger travel.',
            },
            {
                key: 'SHIP_MAX_SPEED',
                label: 'Ship max linear velocity',
                min: 0, max: 3, step: 0.025, default: 0.8,
                fmt: v => v.toFixed(3),
                help: 'Per-frame cap on |velocity| of the ship (normalized refdim/s — same units as ASTEROID_MAX_SPEED). 0 = no cap (ship can keep accelerating indefinitely up to numeric limits).',
            },
            {
                key: 'TOUCH_THRUST_GAIN',
                label: 'Touch displacement → thrust gain',
                min: 0, max: 5, step: 0.1, default: 1.0,
                fmt: v => v.toFixed(2),
                help: 'Linear slope mapping upward displacement (left OR right anchor) to thrustInput. thrustInput is clamped to TOUCH_THRUST_MAX, and peak forward accel = SHIP_THRUST · TOUCH_THRUST_MAX. Higher = stronger thrust per unit finger travel above the anchor.',
            },
            {
                key: 'TOUCH_BRAKE_GAIN',
                label: 'Touch displacement → brake gain',
                min: 0, max: 5, step: 0.1, default: 1.0,
                fmt: v => v.toFixed(2),
                help: 'Linear slope mapping downward displacement (left OR right anchor) to brakeInput. brakeInput is clamped to TOUCH_BRAKE_MAX, and peak braking deceleration = SHIP_BRAKE_STRENGTH · TOUCH_BRAKE_MAX. Brake is pure damping (never reverses the ship). Higher = stronger braking per unit finger travel below the anchor.',
            },
            {
                key: 'TOUCH_STICK_TURN_DEADZONE_PX',
                label: 'Touch turn dead-zone (CSS px)',
                min: 0, max: 60, step: 1, default: 12,
                fmt: v => `${Math.round(v)} px`,
                help: 'Lateral (X-axis) dead-zone half-extent for turning. Finger displacements with |dx| ≤ this value produce zero turn input. Independent of the thrust/brake dead-zone — turning typically wants a smaller deadzone for crisp response. Sized in absolute CSS pixels so the on-screen physical size stays constant across devices and orientations.',
            },
            {
                key: 'TOUCH_STICK_THRUST_DEADZONE_PX',
                label: 'Touch thrust/brake dead-zone (CSS px)',
                min: 0, max: 60, step: 1, default: 16,
                fmt: v => `${Math.round(v)} px`,
                help: 'Vertical (Y-axis) dead-zone half-extent for thrust and brake (applies to left and right anchors). Finger displacements with |dy| ≤ this value produce zero thrust/brake input. Larger values reduce accidental boost/brake from small finger drift. Sized in absolute CSS pixels for device-independent feel.',
            },
        ];

        const STORAGE_KEY = 'astervoids-debug-config';
        const overrides = (() => {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch { return {}; }
        })();

        function persistOverrides() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides)); } catch { /* ignore */ }
        }

        function broadcastOverride(key, value) {
            channel.postMessage({ type: 'config-update', key, value });
        }

        function buildConfigPanel() {
            const panel = document.getElementById('config-panel');
            panel.innerHTML = '';
            for (const def of CONFIG_DEFS) {
                const initial = overrides[def.key] ?? def.default;
                const wrap = document.createElement('div');
                wrap.className = 'config-control';
                wrap.innerHTML = `
                    <label for="cfg-${def.key}">
                        <span>${def.label}</span>
                        <span class="config-value" id="cfg-val-${def.key}">${def.fmt(initial)}</span>
                    </label>
                    <input type="range" id="cfg-${def.key}"
                           min="${def.min}" max="${def.max}" step="${def.step}" value="${initial}">
                    <div class="config-help">${def.help}</div>
                `;
                panel.appendChild(wrap);
                const input = wrap.querySelector('input');
                const valEl = wrap.querySelector('.config-value');
                input.addEventListener('input', () => {
                    const v = Number(input.value);
                    valEl.textContent = def.fmt(v);
                    overrides[def.key] = v;
                    persistOverrides();
                    broadcastOverride(def.key, v);
                });
            }
        }

        function pushAllOverrides() {
            for (const def of CONFIG_DEFS) {
                const v = overrides[def.key] ?? def.default;
                broadcastOverride(def.key, v);
            }
        }

        document.getElementById('config-reset').addEventListener('click', () => {
            for (const def of CONFIG_DEFS) {
                overrides[def.key] = def.default;
                const input = document.getElementById(`cfg-${def.key}`);
                const valEl = document.getElementById(`cfg-val-${def.key}`);
                if (input) input.value = String(def.default);
                if (valEl) valEl.textContent = def.fmt(def.default);
                broadcastOverride(def.key, def.default);
            }
            persistOverrides();
        });

        buildConfigPanel();
        // Push current values immediately so the game picks them up even if it
        // started before the debug page was opened.
        pushAllOverrides();
        // Re-push periodically alongside heartbeats so a game reload re-applies them.
        setInterval(pushAllOverrides, 2000);
    </script>
</body>
</html>
