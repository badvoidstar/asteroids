<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astervoids – Debug</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 24px;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #00ff00;
        }

        #session-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        #no-data {
            color: #888;
            font-style: italic;
        }

        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .column h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }

        .metric-list {
            list-style: none;
            padding: 0;
        }

        .metric-list li {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.95rem;
        }

        .metric-label {
            color: #888;
        }

        .metric-value {
            text-align: right;
            min-width: 80px;
        }

        .section-heading {
            font-size: 0.95rem;
            color: #ffff00;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .rtt-good { color: #00ff00; }
        .rtt-ok { color: #ffff00; }
        .rtt-bad { color: #ff0000; }

        .placeholder-text {
            color: #555;
            font-style: italic;
            font-size: 0.9rem;
        }

        .config-control {
            margin-bottom: 14px;
        }

        .config-control label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 4px;
        }

        .config-control .config-value {
            color: #00ff00;
            font-variant-numeric: tabular-nums;
        }

        .config-control input[type=range] {
            width: 100%;
            accent-color: #00ff00;
        }

        .config-control .config-help {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        button.config-reset {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 4px 10px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 8px;
        }

        button.config-reset:hover {
            background: #00ff0022;
        }
    </style>
</head>
<body>
    <h1>Astervoids Debug</h1>
    <div id="session-label"></div>

    <div class="columns" id="columns">
        <div class="column" id="runtime-column">
            <h2>Runtime Metrics</h2>
            <div id="no-data" class="placeholder-text">Waiting for game data…</div>
            <ul class="metric-list" id="core-metrics"></ul>
            <div id="member-section"></div>
        </div>
        <div class="column">
            <h2>Configuration</h2>
            <div id="config-panel"></div>
            <button class="config-reset" id="config-reset" type="button">Reset to defaults</button>
            <p class="config-help" style="margin-top:8px;">Overrides apply live and persist in this browser. They take effect on the next asteroid split.</p>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('astervoids-debug');
        const coreMetricsEl = document.getElementById('core-metrics');
        const memberSectionEl = document.getElementById('member-section');
        const columnsEl = document.getElementById('columns');
        const noDataEl = document.getElementById('no-data');
        const sessionLabelEl = document.getElementById('session-label');

        // Send periodic heartbeat so the game client knows we're listening
        channel.postMessage('ping');
        setInterval(() => channel.postMessage('ping'), 1000);

        function rttClass(rtt) {
            if (rtt <= 64) return 'rtt-good';
            if (rtt <= 128) return 'rtt-ok';
            return 'rtt-bad';
        }

        function fpsClass(fps) {
            if (fps >= 55) return 'rtt-good';
            if (fps >= 30) return 'rtt-ok';
            return 'rtt-bad';
        }

        function renderCoreMetrics(data) {
            const items = [
                { label: 'RTT', value: `${data.rtt} ms`, cls: rttClass(data.rtt) },
                { label: 'FPS', value: `${data.fps ?? '—'}`, cls: data.fps != null ? fpsClass(data.fps) : '' },
                { label: 'TX (send interval)', value: `${data.tx} ms` },
                { label: 'Jitter', value: `${data.jitter} ms` },
                { label: 'Buffer delay', value: `${data.buf} ms` },
                { label: 'Objects (owned / total)', value: `${data.ownedObjs} / ${data.totalObjs}` },
                { label: 'Reconciliations', value: `${data.reconciliationCount}` }
            ];
            coreMetricsEl.innerHTML = items.map(item => {
                const cls = item.cls ? ` class="${item.cls}"` : '';
                return `<li><span class="metric-label">${item.label}</span><span class="metric-value"${cls}>${item.value}</span></li>`;
            }).join('');
        }

        function renderMemberMetrics(members, myMemberId) {
            const ids = Object.keys(members);
            if (ids.length === 0) {
                memberSectionEl.innerHTML = '';
                return;
            }
            let html = '<div class="section-heading">Per-Member Metrics</div>';
            for (const memberId of ids) {
                const m = members[memberId];
                const label = memberId === myMemberId ? `${memberId} (you)` : memberId;
                const shortId = label.length > 12 ? label.substring(0, 12) + '…' : label;
                html += `<div class="section-heading" style="font-size:0.85rem; color:#aaa; margin-top:10px;">${shortId}</div>`;
                html += '<ul class="metric-list">';
                html += `<li><span class="metric-label">Send interval</span><span class="metric-value">${m.remoteSendInterval} ms</span></li>`;
                html += `<li><span class="metric-label">Computed delay</span><span class="metric-value">${m.computedDelay} ms</span></li>`;
                html += '</ul>';
            }
            memberSectionEl.innerHTML = html;
        }

        channel.onmessage = (event) => {
            const data = event.data;
            noDataEl.style.display = 'none';
            if (data.sessionName) {
                sessionLabelEl.textContent = `Session: ${data.sessionName}`;
            }
            renderCoreMetrics(data);
            renderMemberMetrics(data.members || {}, data.myMemberId || '');
        };

        // ─── Configuration overrides ────────────────────────────────────────
        // Sliders push { type:'config-update', key, value } to the game over the
        // same BroadcastChannel. Values persist in localStorage and are re-broadcast
        // on load so a page refresh (game or debug) doesn't drop the user's tuning.
        const CONFIG_DEFS = [
            {
                key: 'ASTEROID_DENSITY',
                label: 'Asteroid density',
                min: 0.1, max: 5, step: 0.05, default: 1.0,
                fmt: v => v.toFixed(2),
                help: 'M = density · R². Higher density damps separation, deflection and spin uniformly by 1/√density.',
            },
            {
                key: 'BULLET_ENERGY_SIZE_BLEND',
                label: 'Bullet energy size blend',
                min: 0, max: 1, step: 0.01, default: 1.0,
                fmt: v => v.toFixed(2),
                help: '0 = fixed E_b per hit (legacy, compounds across splits). 1 = E_b ∝ R² (generation-independent separation speed).',
            },
        ];

        const STORAGE_KEY = 'astervoids-debug-config';
        const overrides = (() => {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch { return {}; }
        })();

        function persistOverrides() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides)); } catch { /* ignore */ }
        }

        function broadcastOverride(key, value) {
            channel.postMessage({ type: 'config-update', key, value });
        }

        function buildConfigPanel() {
            const panel = document.getElementById('config-panel');
            panel.innerHTML = '';
            for (const def of CONFIG_DEFS) {
                const initial = overrides[def.key] ?? def.default;
                const wrap = document.createElement('div');
                wrap.className = 'config-control';
                wrap.innerHTML = `
                    <label for="cfg-${def.key}">
                        <span>${def.label}</span>
                        <span class="config-value" id="cfg-val-${def.key}">${def.fmt(initial)}</span>
                    </label>
                    <input type="range" id="cfg-${def.key}"
                           min="${def.min}" max="${def.max}" step="${def.step}" value="${initial}">
                    <div class="config-help">${def.help}</div>
                `;
                panel.appendChild(wrap);
                const input = wrap.querySelector('input');
                const valEl = wrap.querySelector('.config-value');
                input.addEventListener('input', () => {
                    const v = Number(input.value);
                    valEl.textContent = def.fmt(v);
                    overrides[def.key] = v;
                    persistOverrides();
                    broadcastOverride(def.key, v);
                });
            }
        }

        function pushAllOverrides() {
            for (const def of CONFIG_DEFS) {
                const v = overrides[def.key] ?? def.default;
                broadcastOverride(def.key, v);
            }
        }

        document.getElementById('config-reset').addEventListener('click', () => {
            for (const def of CONFIG_DEFS) {
                overrides[def.key] = def.default;
                const input = document.getElementById(`cfg-${def.key}`);
                const valEl = document.getElementById(`cfg-val-${def.key}`);
                if (input) input.value = String(def.default);
                if (valEl) valEl.textContent = def.fmt(def.default);
                broadcastOverride(def.key, def.default);
            }
            persistOverrides();
        });

        buildConfigPanel();
        // Push current values immediately so the game picks them up even if it
        // started before the debug page was opened.
        pushAllOverrides();
        // Re-push periodically alongside heartbeats so a game reload re-applies them.
        setInterval(pushAllOverrides, 2000);
    </script>
</body>
</html>
